global:
  scrape_interval: 15s

rule_files:
  - "alert-rules.yml"

scrape_configs:

  - job_name: 'node-exporter'

    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'java-app'

    metrics_path: '/actuator/prometheus'

    static_configs:
      - targets: ['172.31.44.221:8081']

